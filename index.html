<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض كرة القدم</title>
  
  <!-- خط عربي حديث من Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* ----- إعدادات عامة ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0f2b1d 0%, #050d08 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 20px;
    }

    /* ----- كارت العنوان (Overview Header) ----- */
    .header-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px 50px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      margin-bottom: 50px;
      animation: fadeInDown 1.2s ease-out;
    }

    .header-card h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(45deg, #2ecc71, #27ae60, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
      letter-spacing: 2px;
    }

    .header-card p {
      color: #a0aec0;
      font-size: 1.1rem;
      margin-top: 8px;
    }

    /* ----- حاوية حركة الصور ----- */
    .slider-container {
      width: 100%;
      max-width: 1200px;
      overflow: hidden;
      position: relative;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.2);
      padding: 20px 0;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* تأثير التلاشي في الأطراف */
    .slider-container::before,
    .slider-container::after {
      content: "";
      position: absolute;
      top: 0;
      width: 100px;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .slider-container::before {
      right: 0;
      background: linear-gradient(to left, #08160f, transparent);
    }

    .slider-container::after {
      left: 0;
      background: linear-gradient(to right, #08160f, transparent);
    }

    /* شريط الحركة */
    .slider-track {
      display: flex;
      width: max-content;
      gap: 20px;
      /* تحريك من اليسار لليمن بسرعه هادئة (35 ثانية) */
      animation: scrollRight 35s linear infinite;
    }

    /* إيقاف الحركة عند تحريك الماوس على الصور */
    .slider-track:hover {
      animation-play-state: paused;
    }

    /* تصميم كل صورة */
    .slide {
      width: 260px;
      height: 170px;
      flex-shrink: 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      border: 2px solid rgba(255, 255, 255, 0.05);
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide:hover {
      transform: scale(1.08) translateY(-5px);
      box-shadow: 0 15px 30px rgba(46, 204, 113, 0.4);
      border-color: #2ecc71;
    }

    /* ----- زر الصوت المتحرك ----- */
    .audio-controls {
      margin-top: 40px;
    }

    .music-btn {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .music-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(46, 204, 113, 0.5);
    }

    /* ----- كود الانيميشن (Animation) ----- */

    /* التحريك من اليسار إلى اليمين بإنفينيتي بدون فراغات */
    @keyframes scrollRight {
      0% {
        transform: translateX(-50%);
      }
      100% {
        transform: translateX(0%);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- العنوان العلوي -->
  <header class="header-card">
    <h1>كرة القدم</h1>
    <p>شغف الساحرة المستديرة في أروع اللحظات</p>
  </header>

  <!-- شريط الصور المتحرك -->
  <main class="slider-container">
    <div class="slider-track">
      
      <!-- المجموعة الأولى (10 صور) -->
      <div class="slide"><img src="img1.jfif" alt="كرة قدم 1"></div>
      <div class="slide"><img src="img2.jfif" alt="كرة قدم 2"></div>
      <div class="slide"><img src="img3.jfif" alt="كرة قدم 3"></div>
      <div class="slide"><img src="slide4.jfif" alt="كرة قدم 4" onerror="this.src='img4.jfif'"></div>
      <div class="slide"><img src="img5.jfif" alt="كرة قدم 5"></div>
      <div class="slide"><img src="img6.jfif" alt="كرة قدم 6"></div>
      <div class="slide"><img src="img7.jfif" alt="كرة قدم 7"></div>
      <div class="slide"><img src="img8.jfif" alt="كرة قدم 8"></div>
      <div class="slide"><img src="img9.jfif" alt="كرة قدم 9"></div>
      <div class="slide"><img src="img10.jfif" alt="كرة قدم 10"></div>

      <!-- تكرار نفس المجموعة لضمان حركة مستمرة بدون انقطاع (Seamless Loop) -->
      <div class="slide"><img src="img1.jfif" alt="كرة قدم 1"></div>
      <div class="slide"><img src="img2.jfif" alt="كرة قدم 2"></div>
      <div class="slide"><img src="img3.jfif" alt="كرة قدم 3"></div>
      <div class="slide"><img src="img4.jfif" alt="كرة قدم 4"></div>
      <div class="slide"><img src="img5.jfif" alt="كرة قدم 5"></div>
      <div class="slide"><img src="img6.jfif" alt="كرة قدم 6"></div>
      <div class="slide"><img src="img7.jfif" alt="كرة قدم 7"></div>
      <div class="slide"><img src="img8.jfif" alt="كرة قدم 8"></div>
      <div class="slide"><img src="img9.jfif" alt="كرة قدم 9"></div>
      <div class="slide"><img src="img10.jfif" alt="كرة قدم 10"></div>

    </div>
  </main>

  <!-- عنصر الأغنية وزر التشغيل -->
  <div class="audio-controls">
    <!-- اجمعي ملف الأغنية باسم dai_dai.mp3 في نفس المجلد -->
    <audio id="bgMusic" loop>
      <source src="dai_dai.mp3" type="audio/mpeg">
      المتصفح لا يدعم مشغل الصوت.
    </audio>
    <button class="music-btn" onclick="toggleMusic()">
      🎵 تشغيل أغنية Dai Dai
    </button>
  </div>

  <script>
    function toggleMusic() {
      const music = document.getElementById('bgMusic');
      const btn = document.querySelector('.music-btn');
      
      if (music.paused) {
        music.play();
        btn.innerHTML = '⏸️ إيقاف الموسيقى';
      } else {
        music.pause();
        btn.innerHTML = '🎵 تشغيل أغنية Dai Dai';
      }
    }
  </script>

</body>
</html>
